name: Download media to R2

on:
  workflow_dispatch:
    inputs:
      url:
        description: '粘贴视频或图片链接'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码内容
        uses: actions/checkout@v4

      - name: 安装下载引擎
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: 执行下载任务
        run: |
          mkdir downloads
          # 这里使用强大的 yt-dlp 引擎下载视频
          yt-dlp -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      - name: 搬运到 Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_S3_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: 'auto'
          SOURCE_DIR: 'downloads'

      - name: 完成提示
        run: echo "✅ 文件已搬运至 R2 存储桶！"
